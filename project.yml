# Kzu Xcode Project Configuration
# --------------------------------
# This file is used by XcodeGen to generate the .xcodeproj
#
# Install:  brew install xcodegen
# Generate: cd c:\programming\kzu && xcodegen generate
# --------------------------------

name: Kzu
options:
  bundleIdPrefix: com.kzu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
    DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: false

configs:
  Debug:
    buildSettings:
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
  Release:
    buildSettings:
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      SWIFT_OPTIMIZATION_LEVEL: "-O"

# ─────────────────────────────────────────
# Targets
# ─────────────────────────────────────────

targets:

  # ── Main App Target ──
  Kzu:
    type: application
    platform: iOS
    sources:
      - path: Kzu
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Kzu/Resources
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Kzu/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kzu.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Kzu/Kzu.entitlements
        VALIDATE_PRODUCT: false
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

    dependencies:
      - target: DeviceActivityMonitorExtension
      - target: ShieldConfigurationExtension
      - target: KzuLiveActivityExtension
        embed: true
        codeSign: true
    scheme:
      testTargets:
        - KzuTests

  # ── DeviceActivityMonitor Extension ──
  DeviceActivityMonitorExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: DeviceActivityMonitorExtension
    settings:
      base:
        INFOPLIST_FILE: DeviceActivityMonitorExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kzu.app.device-activity-monitor
        CODE_SIGN_ENTITLEMENTS: DeviceActivityMonitorExtension/DeviceActivityMonitorExtension.entitlements
        SKIP_INSTALL: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  # ── ShieldConfiguration Extension ──
  ShieldConfigurationExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShieldConfigurationExtension
    settings:
      base:
        INFOPLIST_FILE: ShieldConfigurationExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kzu.app.shield-configuration
        CODE_SIGN_ENTITLEMENTS: ShieldConfigurationExtension/ShieldConfigurationExtension.entitlements
        SKIP_INSTALL: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  # ── Live Activity Widget Extension ──
  KzuLiveActivityExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: KzuLiveActivityExtension
      # Shared model compiled into both app and extension
      - path: Kzu/App/KzuLiveActivityAttributes.swift
    settings:
      base:
        INFOPLIST_FILE: KzuLiveActivityExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kzu.app.live-activity
        CODE_SIGN_ENTITLEMENTS: KzuLiveActivityExtension/KzuLiveActivityExtension.entitlements
        SKIP_INSTALL: true
        VALIDATE_PRODUCT: false
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  # ── Unit Tests ──
  KzuTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KzuTests
    dependencies:
      - target: Kzu
    settings:
      base:
        INFOPLIST_FILE: KzuTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kzu.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Kzu.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Kzu"
        BUNDLE_LOADER: "$(TEST_HOST)"
